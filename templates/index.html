<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Отчёт по контрольным точкам GPX</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, sans-serif;
      color: #172033;
      background: #f4f6fa;
    }

    body {
      margin: 0;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    h1 {
      margin-top: 0;
    }

    section {
      margin-top: 24px;
      padding: 24px;
      border: 1px solid #d8deea;
      border-radius: 12px;
      background: white;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 600;
    }

    .label-text {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-icon {
      position: relative;
      color: #526176;
      cursor: help;
      font-size: .9em;
      line-height: 1;
      outline-offset: 2px;
    }

    .tooltip {
      position: absolute;
      z-index: 1;
      bottom: calc(100% + 8px);
      left: 50%;
      width: 220px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #172033;
      color: white;
      font-size: .85rem;
      font-weight: 400;
      line-height: 1.3;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%);
      visibility: hidden;
    }

    .info-icon:hover .tooltip,
    .info-icon:focus .tooltip {
      opacity: 1;
      visibility: visible;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input {
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid #aeb8ca;
      border-radius: 6px;
    }

    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 6px;
      background: #2457d6;
      color: white;
      cursor: pointer;
    }

    button.secondary {
      background: #526176;
    }

    button.danger {
      background: #b42318;
    }

    button:disabled {
      cursor: wait;
      opacity: .6;
    }

    summary {
      width: fit-content;
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 6px;
      background: #526176;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    details[open] summary {
      margin-bottom: 16px;
    }

    .hidden-checkpoints {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #d8deea;
    }

    .settings {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }

    .checkpoint-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 10px;
    }

    .checkpoint-row[data-hidden="true"] {
      opacity: .58;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
    }

    .error {
      color: #7a271a;
      background: #fef3f2;
    }

    .warning {
      color: #7a2e0e;
      background: #fffaeb;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 10px;
      border: 1px solid #d8deea;
      text-align: left;
    }

    th {
      background: #eef2f8;
    }

    .report-map-link {
      color: inherit;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 720px) {
      .settings,
      .checkpoint-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Отчёт по контрольным точкам GPX</h1>
    <p>Загрузите GPX-треки и получите время прибытия.</p>

    <form id="report-form">
      <section>
        <h2>Настройки</h2>
        <div class="settings">
          <label>
            Маршрут
            <select id="route">
              <option value="300">Orhei 300</option>
              <option value="200">Orhei 200</option>
            </select>
          </label>
          <label>
            Часовой пояс браузера
            <input id="timezone" readonly required>
          </label>
          <label>
            <span class="label-text">
              Радиус контрольной точки (м)
              <span
                class="info-icon"
                role="img"
                tabindex="0"
                aria-label="Расстояние, в пределах которого точка считается пройденной."
              >
                ⓘ
                <span class="tooltip" aria-hidden="true">
                  Расстояние, в пределах которого точка считается пройденной.
                </span>
              </span>
            </span>
            <input id="radius" type="number" min="0.01" step="any" required>
          </label>
        </div>

        <details>
          <summary>Контрольные точки</summary>
          <div id="checkpoint-rows"></div>
          <button id="add-checkpoint" class="secondary" type="button">
            Добавить контрольную точку
          </button>
        </details>

        <details class="hidden-checkpoints">
          <summary>
            <span class="label-text">
              Скрытые контрольные точки
              <span
                class="info-icon"
                role="img"
                tabindex="0"
                aria-label="Скрытые точки не показываются участникам маршрута. Они помогают проверить, срезал ли райдер маршрут."
              >
                ⓘ
                <span class="tooltip" aria-hidden="true">
                  Скрытые точки не показываются участникам маршрута. Они помогают проверить, срезал ли райдер маршрут.
                </span>
              </span>
            </span>
          </summary>
          <div id="hidden-checkpoint-rows"></div>
          <button id="add-hidden-checkpoint" class="secondary" type="button">
            Добавить скрытую точку
          </button>
        </details>
      </section>

      <section>
        <h2>Файлы GPX</h2>
        <label>
          Выберите один или несколько треков
          <input id="gpx-files" type="file" accept=".gpx" multiple required>
        </label>
        <div class="actions">
          <button id="generate-report" type="submit">Сформировать отчёт</button>
        </div>
        <div id="error" class="message error" role="alert" hidden></div>
      </section>
    </form>

    <section id="report-section" hidden>
      <h2>Отчёт</h2>
      <div class="table-wrap">
        <table id="report-table"></table>
      </div>
      <div id="warnings" class="message warning" hidden></div>
      <div class="actions">
        <button id="download-csv" type="button">Скачать CSV</button>
      </div>
    </section>
  </main>

  <script>
    const defaults = {{ defaults | tojson }};
    const rowsContainer = document.querySelector("#checkpoint-rows");
    const hiddenRowsContainer = document.querySelector("#hidden-checkpoint-rows");
    const form = document.querySelector("#report-form");
    const errorBox = document.querySelector("#error");
    const reportSection = document.querySelector("#report-section");
    const reportTable = document.querySelector("#report-table");
    const warningsBox = document.querySelector("#warnings");
    const submitButton = document.querySelector("#generate-report");
    const routeSelect = document.querySelector("#route");
    let reportData = null;
    let lastLoadedRoute = defaults.route;

    routeSelect.value = defaults.route;
    document.querySelector("#timezone").value =
      Intl.DateTimeFormat().resolvedOptions().timeZone;
    document.querySelector("#radius").value = defaults.radius_m;

    function addCheckpoint(container, checkpoint = {}, hidden = false) {
      const row = document.createElement("div");
      row.className = "checkpoint-row";
      row.dataset.hidden = hidden ? "true" : "false";
      row.dataset.color = checkpoint.color ?? "";
      row.innerHTML = `
        <label>
          Название
          <input class="checkpoint-name" required>
        </label>
        <label>
          Широта
          <input class="checkpoint-latitude" type="number"
            min="-90" max="90" step="any" required>
        </label>
        <label>
          Долгота
          <input class="checkpoint-longitude" type="number"
            min="-180" max="180" step="any" required>
        </label>
        <button class="danger delete-checkpoint" type="button">Удалить</button>
      `;
      row.querySelector(".checkpoint-name").value = checkpoint.name ?? "";
      const latitudeInput = row.querySelector(".checkpoint-latitude");
      const longitudeInput = row.querySelector(".checkpoint-longitude");
      latitudeInput.value = checkpoint.latitude ?? "";
      longitudeInput.value = checkpoint.longitude ?? "";
      row.querySelector(".delete-checkpoint").addEventListener(
        "click",
        () => row.remove(),
      );
      container.append(row);
    }

    function applyConfiguration(configuration) {
      document.querySelector("#radius").value = configuration.radius_m;
      rowsContainer.replaceChildren();
      hiddenRowsContainer.replaceChildren();
      configuration.checkpoints
        .filter((checkpoint) => !checkpoint.hidden)
        .forEach((checkpoint) => addCheckpoint(rowsContainer, checkpoint, false));
      configuration.checkpoints
        .filter((checkpoint) => checkpoint.hidden)
        .forEach((checkpoint) => addCheckpoint(hiddenRowsContainer, checkpoint, true));
    }

    applyConfiguration(defaults);

    routeSelect.addEventListener("change", async () => {
      const selectedRoute = routeSelect.value;
      errorBox.hidden = true;
      try {
        const response = await fetch(`/api/config/${selectedRoute}`);
        const configuration = await response.json();
        if (!response.ok) {
          throw new Error(configuration.error || "Не удалось загрузить маршрут.");
        }
        applyConfiguration(configuration);
        lastLoadedRoute = selectedRoute;
        reportData = null;
        reportSection.hidden = true;
      } catch (error) {
        routeSelect.value = lastLoadedRoute;
        errorBox.textContent = error.message;
        errorBox.hidden = false;
      }
    });

    document.querySelector("#add-checkpoint").addEventListener(
      "click",
      () => addCheckpoint(rowsContainer, {}, false),
    );
    document.querySelector("#add-hidden-checkpoint").addEventListener(
      "click",
      () => addCheckpoint(hiddenRowsContainer, {}, true),
    );

    function currentConfiguration() {
      return {
        timezone: document.querySelector("#timezone").value,
        radius_m: Number(document.querySelector("#radius").value),
        checkpoints: [...document.querySelectorAll(".checkpoint-row")].map(
          (row) => ({
            name: row.querySelector(".checkpoint-name").value,
            latitude: Number(row.querySelector(".checkpoint-latitude").value),
            longitude: Number(row.querySelector(".checkpoint-longitude").value),
            hidden: row.dataset.hidden === "true",
          }),
        ),
      };
    }

    function currentColumnColors() {
      return [
        "",
        ...[...document.querySelectorAll(".checkpoint-row")].map(
          (row) => row.dataset.color,
        ),
      ];
    }

    function currentColumnHiddenFlags() {
      return [
        false,
        ...[...document.querySelectorAll(".checkpoint-row")].map(
          (row) => row.dataset.hidden === "true",
        ),
      ];
    }

    function googleMapsLink(latitude, longitude) {
      if (!latitude || !longitude) {
        return "";
      }
      return `https://www.google.com/maps?q=${encodeURIComponent(
        `${latitude},${longitude}`,
      )}`;
    }

    function currentColumnMapLinks() {
      return [
        "",
        ...[...document.querySelectorAll(".checkpoint-row")].map((row) =>
          googleMapsLink(
            row.querySelector(".checkpoint-latitude").value.trim(),
            row.querySelector(".checkpoint-longitude").value.trim(),
          ),
        ),
      ];
    }

    function applyReportNameColor(element, color) {
      if (!color) {
        return;
      }
      element.style.color = color;
    }

    function applyReportHiddenStyle(element, hidden) {
      if (!hidden) {
        return;
      }
      element.style.opacity = ".58";
    }

    function appendReportLink(cell, text, href, color) {
      if (!href) {
        cell.textContent = text;
        applyReportNameColor(cell, color);
        return;
      }
      const link = document.createElement("a");
      link.className = "report-map-link";
      link.href = href;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.textContent = text;
      applyReportNameColor(link, color);
      cell.append(link);
    }

    function renderReport(
      data,
      columnColors = [],
      columnMapLinks = [],
      columnHiddenFlags = [],
    ) {
      reportTable.replaceChildren();
      const header = reportTable.createTHead().insertRow();
      data.columns.forEach((column, index) => {
        const cell = document.createElement("th");
        cell.scope = "col";
        appendReportLink(
          cell,
          column,
          columnMapLinks[index],
          columnColors[index],
        );
        applyReportHiddenStyle(cell, columnHiddenFlags[index]);
        header.append(cell);
      });
      const body = reportTable.createTBody();
      data.rows.forEach((values) => {
        const row = body.insertRow();
        values.forEach((value, index) => {
          const cell = row.insertCell();
          cell.textContent = value;
          applyReportHiddenStyle(cell, columnHiddenFlags[index]);
        });
      });

      warningsBox.replaceChildren();
      if (data.warnings.length) {
        const list = document.createElement("ul");
        data.warnings.forEach((warning) => {
          const item = document.createElement("li");
          item.textContent = warning;
          list.append(item);
        });
        warningsBox.append(list);
        warningsBox.hidden = false;
      } else {
        warningsBox.hidden = true;
      }
      reportSection.hidden = false;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorBox.hidden = true;
      if (!document.querySelectorAll(".checkpoint-row").length) {
        errorBox.textContent = "Добавьте хотя бы одну контрольную точку.";
        errorBox.hidden = false;
        return;
      }

      const body = new FormData();
      const columnColors = currentColumnColors();
      const columnHiddenFlags = currentColumnHiddenFlags();
      const columnMapLinks = currentColumnMapLinks();
      body.append("configuration", JSON.stringify(currentConfiguration()));
      [...document.querySelector("#gpx-files").files].forEach(
        (file) => body.append("gpx_files", file),
      );

      submitButton.disabled = true;
      try {
        const response = await fetch("/api/report", { method: "POST", body });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "Unable to generate report.");
        }
        reportData = data;
        renderReport(data, columnColors, columnMapLinks, columnHiddenFlags);
      } catch (error) {
        errorBox.textContent = error.message;
        errorBox.hidden = false;
      } finally {
        submitButton.disabled = false;
      }
    });

    function csvCell(value) {
      return `"${String(value).replaceAll('"', '""')}"`;
    }

    document.querySelector("#download-csv").addEventListener("click", () => {
      if (!reportData) {
        return;
      }
      const csv = [reportData.columns, ...reportData.rows]
        .map((row) => row.map(csvCell).join(","))
        .join("\r\n");
      const url = URL.createObjectURL(
        new Blob(["\uFEFF", csv], { type: "text/csv;charset=utf-8" }),
      );
      const link = document.createElement("a");
      link.href = url;
      link.download = "report.csv";
      link.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
